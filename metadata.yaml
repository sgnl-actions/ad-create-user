name: ad-update-user
description: Update user attributes in on-premise Active Directory via LDAP

inputs:
  userDN:
    type: text
    description: Distinguished Name of the user to update (e.g., CN=John Doe,OU=Users,DC=example,DC=com)
    required: true

  attributes:
    type: object
    description: Object containing attribute names and values to update
    required: false

  samAccountName:
    type: text
    description: SAM account name (maps to sAMAccountName)
    required: false

  firstName:
    type: text
    description: First name (maps to givenName)
    required: false

  lastName:
    type: text
    description: Last name (maps to sn)
    required: false

  displayName:
    type: text
    description: Display name (maps to displayName)
    required: false

  email:
    type: text
    description: Email address (maps to mail)
    required: false

  company:
    type: text
    description: Company name (maps to company)
    required: false

  department:
    type: text
    description: Department name (maps to department)
    required: false

  title:
    type: text
    description: Job title (maps to title)
    required: false

  address:
    type: text
    description: Optional LDAP/LDAPS URL override (e.g., ldaps://dc.example.com:636)
    required: false

outputs:
  status:
    type: text
    description: Operation result (success, halted)

  userDN:
    type: text
    description: Distinguished Name of the updated user

  modified:
    type: boolean
    description: Whether the user attributes were modified

  attributes:
    type: array
    description: List of attribute names that were updated

  address:
    type: text
    description: LDAP server address used

  message:
    type: text
    description: Additional status message or error details
