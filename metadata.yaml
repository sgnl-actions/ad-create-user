# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: ad-create-user
description: Create a new user in on-premise Active Directory via LDAP

inputs:
  userDN:
    type: text
    description: Distinguished Name for the new user to create (e.g., CN=John Doe,OU=Users,DC=example,DC=com)
    required: true

  samAccountName:
    type: text
    description: SAM account name (maps to sAMAccountName)
    required: true

  userPrincipalName:
    type: text
    description: User Principal Name (maps to userPrincipalName, e.g., user@example.com)
    required: true

  firstName:
    type: text
    description: First name (maps to givenName)
    required: true

  lastName:
    type: text
    description: Last name (maps to sn)
    required: true

  displayName:
    type: text
    description: Display name (maps to displayName)
    required: false

  email:
    type: text
    description: Email address (maps to mail)
    required: false

  company:
    type: text
    description: Company name (maps to company)
    required: false

  department:
    type: text
    description: Department name (maps to department)
    required: false

  title:
    type: text
    description: Job title (maps to title)
    required: false

  enabled:
    type: boolean
    description: Whether the account should be enabled (default false; sets userAccountControl to 512 or 514)
    required: false

  password:
    type: text
    description: Initial password for the new user (encoded as unicodePwd; requires LDAPS)
    required: false

  changePasswordAtNextLogin:
    type: boolean
    description: Whether the user must change their password at next login (default false; sets pwdLastSet to 0)
    required: false

  additionalAttributes:
    type: text
    description: Object containing additional LDAP attribute names and values to set on the new user
    required: false

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

  successIfAlreadyExists:
    type: boolean
    description: If true, return success when user already exists instead of throwing an error (default false)
    required: false

  address:
    type: text
    description: Optional LDAP server URL override
    required: false

outputs:
  status:
    type: text
    description: Operation result (success, halted)

  userDN:
    type: text
    description: Distinguished Name of the created user

  created:
    type: boolean
    description: Whether the user was created

  alreadyExisted:
    type: boolean
    description: True if the user already existed (when successIfAlreadyExists is enabled)

  attributes:
    type: array
    description: List of user-supplied attribute names that were set

  enabled:
    type: boolean
    description: Whether the account was created as enabled

  address:
    type: text
    description: LDAP server address used
